{% extends 'users/layout.html' %}

{% block title %}
    Log In
{% endblock %}

{% block content %}
    <aside>
        <h2>Log In</h2>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required autocomplete="username" class="username">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password" class="password">
            <button type="submit">Enter</button>
        </form>
        <p>Create an account? <a href="{% url 'register' %}">Register</a></p>
    </aside>
{% endblock %}
